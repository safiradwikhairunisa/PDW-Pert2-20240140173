<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snoopy</title>
    
    <link rel="stylesheet" href="index.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&display=swap" rel="stylesheet">

<style>
    body{
        background:#f2f2f2;
        font-family: Arial, Helvetica, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .card{
        background:#f6d77b;
        width:650px;
        padding:40px;
        border-radius:20px;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .text{
        width:60%;
        align-self: flex-start;
    }

    .title{
        font-family:'Tangerine', cursive;
        font-size:120px;
        margin-top:0;
        margin-bottom:0;
        letter-spacing:2px;
    }

    .desc{
        font-family:"Times New Roman", serif;
        font-size: 20px;
        line-height: 1.6;
        text-align:justify;
    }
    </style>
    </head>
    
    <body>
        <div class="card">
            <div class="text">
                <h2 class="title" style="color:#333;">Snoopy</h2>
                <p class="desc">
                Snoopy adalah karakter anjing dari komik Peanuts yang sangat terkenal. 
                Ia dikenal dengan imajinasinya yang tinggi dan sering berpetualang 
                dalam dunia khayalannya.
            </p>
        </div>
        
        <img src="Snoopy.png" alt="Snoopy" class="snoopy">
    </div>
</body>
</html>
